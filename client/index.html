<!--
  CRM Platform HTML Entry Point
  
  This HTML file serves as the entry point for the React CRM application.
  It includes meta tags for SEO, social media sharing, and responsive design.
  
  Features:
  - SEO-optimized meta tags
  - Open Graph and Twitter Card support
  - Responsive viewport configuration
  - Favicon and app icons
  - Performance optimizations
  - Accessibility features
  
  @author CRM Platform Team
  @version 1.0.0
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gigly — book gigs, send quotes, and manage client portals for event vendors" />
    <meta name="keywords" content="gigly, event vendor, booking, quotes, invoices, client portal, weddings, events" />
    <meta name="author" content="Gigly" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://localhost:5173/" />
    <meta property="og:title" content="Gigly" />
    <meta property="og:description" content="Book gigs. Quote clients. Get paid." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="http://localhost:5173/" />
    <meta property="twitter:title" content="Gigly" />
    <meta property="twitter:description" content="Book gigs. Quote clients. Get paid." />
    <meta property="twitter:image" content="/twitter-image.jpg" />

    <title>Gigly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
