  CRM Platform HTML Entry Point
  
  This HTML file serves as the entry point for the React CRM application.
  It includes meta tags for SEO, social media sharing, and responsive design.
  
  Features:
  - SEO-optimized meta tags
  - Open Graph and Twitter Card support
  - Responsive viewport configuration
  - Favicon and app icons
  - Performance optimizations

  @author CRM Platform Team
  @version 1.0.0

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/smoothgig-logo.png" />
    <link rel="apple-touch-icon" href="/smoothgig-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SmoothGig — quotes, client portals, and payments for event vendors" />
    <meta name="keywords" content="event vendor, booking, quotes, invoices, client portal, weddings, events" />
    <meta name="author" content="SmoothGig" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://localhost:5173/" />
    <meta property="og:title" content="SmoothGig" />
    <meta property="og:description" content="Streamlined booking workflow for event vendors" />
    <meta property="og:image" content="/smoothgig-logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="http://localhost:5173/" />
    <meta property="twitter:title" content="SmoothGig" />
    <meta property="twitter:description" content="Streamlined booking workflow for event vendors" />
    <meta property="twitter:image" content="/smoothgig-logo.png" />

    <title>SmoothGig</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
