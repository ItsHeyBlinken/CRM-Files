# Nixpacks Configuration for Event Planner CRM
# This file configures the Nixpacks build process for deployment

# Specify Node.js version (use 20 to avoid EOL warning)
[variables]
NIXPACKS_NODE_VERSION = '20'

# Setup phase: Install additional packages if needed
[phases.setup]
nixPkgs = ['...']

# Install phase: Install all dependencies (including devDependencies for TypeScript)
[phases.install]
cmds = [
  'echo "=== Installing dependencies ==="',
  'npm ci',
  'cd /app/server && npm install',
  'cd /app/client && npm install',
  'echo "=== Dependencies installed ==="'
]

# Build phase: Build both client and server
# Build client first, then server
[phases.build]
cmds = [
  'echo "========================================"',
  'echo "=== CLEANING OLD BUILDS ==="',
  'echo "========================================"',
  'rm -rf /app/client/dist /app/server/dist',
  'echo "Old dist folders removed"',
  'export BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")',
  'echo "Build timestamp: $BUILD_TIMESTAMP"',
  'echo "=== Building Client ==="',
  'cd /app/client && npm run build',
  'echo "=== Client build complete ==="',
  'ls -la /app/client/dist/ | head -5',
  'echo "=== Building Server ==="',
  'cd /app/server && BUILD_TIMESTAMP=$BUILD_TIMESTAMP npm run build',
  'echo "=== Server build complete ==="',
  'ls -la /app/server/dist/ | head -10',
  'echo "=== Verifying builds ==="',
  'test -f /app/server/dist/index.js && echo "✅ SUCCESS: server/dist/index.js exists" || (echo "❌ ERROR: server/dist/index.js missing" && exit 1)',
  'echo "=== Checking for new code ==="',
  'grep -q "v2.1.0-FIXED" /app/server/dist/index.js && echo "✅ NEW CODE VERSION FOUND" || echo "❌ WARNING: Old code version detected"',
  'grep -q "BUILD_TIMESTAMP" /app/server/dist/index.js && echo "✅ Build timestamp code found" || echo "❌ WARNING: Build timestamp code missing"',
  'grep -q "fonts.googleapis.com" /app/server/dist/index.js && echo "✅ CSP includes fonts.googleapis.com" || echo "⚠️ WARNING: CSP may not be updated"',
  'grep -q "trust proxy" /app/server/dist/index.js && echo "✅ Trust proxy code found" || echo "⚠️ WARNING: Trust proxy code may not be set"',
  'echo "========================================"',
  'echo "=== BUILD VERIFICATION COMPLETE ==="',
  'echo "========================================"'
]

# Start phase: Start the server
[start]
cmd = 'cd /app/server && BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ") node dist/index.js'

# Environment variables (can be overridden by VPS settings)
[env]
NODE_ENV = 'production'

